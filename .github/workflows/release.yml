name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Tiny job just to extract the version — everything else runs in parallel
  version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  infrastructure:
    name: Infrastructure
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Pulumi CLI
        run: curl -fsSL https://get.pulumi.com | sh && echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Install infra dependencies
        run: cd infra && npm ci && cd functions && npm ci

      - name: Write GCP credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > /tmp/gcp-key.json

      - name: Pulumi up
        run: cd infra && pulumi stack select dev --create && pulumi up --yes --refresh
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
          EDGEGAP_API_TOKEN: ${{ secrets.EDGEGAP_API_TOKEN }}
          EDGEGAP_APP_NAME: ${{ secrets.EDGEGAP_APP_NAME }}
          EDGEGAP_APP_VERSION: ${{ needs.version.outputs.version }}

      - name: Install sync script dependencies
        run: cd scripts && npm ci

      - name: Sync maps to Firestore
        run: node scripts/sync-maps.js
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json

  server:
    name: Server Docker
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker image
        env:
          EDGEGAP_DOCKER_PASSWORD: ${{ secrets.EDGEGAP_DOCKER_PASSWORD }}
          EDGEGAP_DOCKER_USERNAME: ${{ secrets.EDGEGAP_DOCKER_USERNAME }}
          EDGEGAP_IMAGE_NAME: ${{ secrets.EDGEGAP_IMAGE_NAME }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          echo "$EDGEGAP_DOCKER_PASSWORD" | \
            docker login registry.edgegap.com -u "$EDGEGAP_DOCKER_USERNAME" --password-stdin
          docker build -t "registry.edgegap.com/${EDGEGAP_IMAGE_NAME}:${VERSION}" .
          docker push "registry.edgegap.com/${EDGEGAP_IMAGE_NAME}:${VERSION}"

      - name: Delete old Edgegap versions (free tier limit of 2)
        env:
          EDGEGAP_API_TOKEN: ${{ secrets.EDGEGAP_API_TOKEN }}
          EDGEGAP_APP_NAME: ${{ secrets.EDGEGAP_APP_NAME }}
        run: |
          # Get all versions and delete them (we'll create the new one next)
          curl -s -H "Authorization: token ${EDGEGAP_API_TOKEN}" \
            "https://api.edgegap.com/v1/app/${EDGEGAP_APP_NAME}/versions" | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          versions = data if isinstance(data, list) else data.get('data', data.get('versions', []))
          for v in versions:
            name = v.get('name', v) if isinstance(v, dict) else v
            print(name)
          " 2>/dev/null | while read V; do
            echo "Deleting version: $V"
            curl -s -X DELETE "https://api.edgegap.com/v1/app/${EDGEGAP_APP_NAME}/version/${V}" \
              -H "Authorization: token ${EDGEGAP_API_TOKEN}" || true
          done

      - name: Create or update Edgegap app version
        env:
          EDGEGAP_API_TOKEN: ${{ secrets.EDGEGAP_API_TOKEN }}
          EDGEGAP_APP_NAME: ${{ secrets.EDGEGAP_APP_NAME }}
          EDGEGAP_IMAGE_NAME: ${{ secrets.EDGEGAP_IMAGE_NAME }}
          EDGEGAP_DOCKER_USERNAME: ${{ secrets.EDGEGAP_DOCKER_USERNAME }}
          EDGEGAP_DOCKER_PASSWORD: ${{ secrets.EDGEGAP_DOCKER_PASSWORD }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          PAYLOAD="{
            \"name\": \"${VERSION}\",
            \"docker_repository\": \"registry.edgegap.com\",
            \"docker_image\": \"${EDGEGAP_IMAGE_NAME}\",
            \"docker_tag\": \"${VERSION}\",
            \"private_username\": \"${EDGEGAP_DOCKER_USERNAME}\",
            \"private_token\": \"${EDGEGAP_DOCKER_PASSWORD}\",
            \"req_cpu\": 256,
            \"req_memory\": 256,
            \"ports\": [
              {
                \"port\": 5000,
                \"protocol\": \"UDP\",
                \"name\": \"gameport\"
              }
            ]
          }"
          # Try create, if 409 (exists) then patch/update
          HTTP_CODE=$(curl -s -o /tmp/edgegap_response.json -w "%{http_code}" -X POST \
            "https://api.edgegap.com/v1/app/${EDGEGAP_APP_NAME}/version" \
            -H "Authorization: token ${EDGEGAP_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          if [ "$HTTP_CODE" = "409" ]; then
            echo "Version ${VERSION} exists, updating..."
            curl -sf --show-error -X PATCH \
              "https://api.edgegap.com/v1/app/${EDGEGAP_APP_NAME}/version/${VERSION}" \
              -H "Authorization: token ${EDGEGAP_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
          elif [ "$HTTP_CODE" -ge 400 ]; then
            cat /tmp/edgegap_response.json
            exit 1
          else
            echo "Version ${VERSION} created successfully"
            cat /tmp/edgegap_response.json
          fi

  client-macos-arm:
    name: Client (macOS ARM)
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Override cargo config for CI (no build-std, no clang/mold)
        run: |
          cat > .cargo/config.toml <<'EOF'
          [target.aarch64-apple-darwin]
          rustflags = ["-Zshare-generics=y", "-Zthreads=0"]
          EOF
      - name: Build
        run: cargo build --release --no-default-features --features release --bin client --target aarch64-apple-darwin
      - name: Package
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/client dist/nebulous-client
          cd dist && zip "nebulous-client-v${VERSION}-macos-arm64.zip" nebulous-client
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip

  client-windows:
    name: Client (Windows)
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --no-default-features --features release --bin client --target x86_64-pc-windows-msvc
      - name: Package
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p dist
          cp target/x86_64-pc-windows-msvc/release/client.exe dist/nebulous-client.exe
          cd dist && 7z a "nebulous-client-v${VERSION}-windows-x86_64.zip" nebulous-client.exe
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip

  client-linux:
    name: Client (Linux)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev

      - name: Override cargo config for CI (no clang/mold)
        run: |
          cat > .cargo/config.toml <<'EOF'
          [target.x86_64-unknown-linux-gnu]
          rustflags = ["-Zshare-generics=y", "-Zthreads=0"]
          [unstable]
          build-std = ["std", "core", "alloc", "panic_abort"]
          EOF
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --no-default-features --features release --bin client --target x86_64-unknown-linux-gnu
      - name: Package
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/client dist/nebulous-client
          cd dist && zip "nebulous-client-v${VERSION}-linux-x86_64.zip" nebulous-client
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
